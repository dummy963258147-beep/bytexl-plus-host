<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Google Docs Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8eaf6;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg,#6c63ff,#00d4aa);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo-text h1 { font-size: 18px; font-weight: 700; }
    .logo-text h1 span { color: #6c63ff; }
    .logo-text p { font-size: 12px; color: #8892b0; margin-top: 2px; }

    h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #8892b0; margin-bottom: 24px; line-height: 1.5; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    label { font-size: 12px; font-weight: 600; color: #8892b0; text-transform: uppercase; letter-spacing: .6px; }

    input {
      background: #0f1117;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #e8eaf6;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    input:focus { border-color: #6c63ff; }
    input::placeholder { color: #4a5568; }

    .btn {
      width: 100%;
      background: linear-gradient(135deg,#6c63ff,#5b52e0);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .status {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }
    .status.success { background: rgba(0,212,170,.1); border: 1px solid rgba(0,212,170,.3); color: #00d4aa; display: block; }
    .status.error   { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.3);  color: #ef4444;  display: block; }
    .status.info    { background: rgba(108,99,255,.1); border: 1px solid rgba(108,99,255,.3); color: #a5b4fc; display: block; }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #4a5568;
      text-align: center;
      line-height: 1.6;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📄</div>
    <div class="logo-text">
      <h1>Google Docs <span>Reader</span></h1>
      <p>Extension Access Portal</p>
    </div>
  </div>

  <h2>Create Account</h2>
  <p class="subtitle">Register your username and password. Your account will be activated once the admin approves your payment.</p>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Choose a username" autocomplete="off" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 6 characters" />
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat your password" />
  </div>

  <button class="btn" id="registerBtn">Register</button>
  <div class="status" id="status"></div>

  <p class="note">
    Already registered? Open the extension and login.<br/>
    Access is granted only after admin approval.
  </p>
</div>

<script>
  // ── CONFIG — must match background.js ─────────────────────────────────────
  const GITHUB_PAT   = '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';
  const GITHUB_OWNER = 'dummy963258147-beep';
  const GITHUB_REPO  = 'bytexl-plus-users';
  const USERS_FILE   = 'users.json';
  // ──────────────────────────────────────────────────────────────────────────

  const API_BASE = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${USERS_FILE}`;
  const HEADERS  = {
    'Authorization': `Bearer ${GITHUB_PAT}`,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json',
  };

  async function hashPassword(password) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function readUsers() {
    const res = await fetch(API_BASE, { headers: HEADERS });
    if (res.status === 404) return { users: [], sha: null };
    if (!res.ok) throw new Error('Failed to reach user database');
    const data = await res.json();
    const content = JSON.parse(atob(data.content.replace(/\n/g, '')));
    return { users: content.users || [], sha: data.sha };
  }

  async function writeUsers(users, sha) {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify({ users }, null, 2))));
    const body = { message: 'register user', content, ...(sha ? { sha } : {}) };
    const res = await fetch(API_BASE, { method: 'PUT', headers: HEADERS, body: JSON.stringify(body) });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || 'Failed to save registration');
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = `status ${type}`;
  }

  document.getElementById('registerBtn').addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const btn      = document.getElementById('registerBtn');

    if (!username || !password || !confirm) { showStatus('Please fill in all fields.', 'error'); return; }
    if (username.length < 3) { showStatus('Username must be at least 3 characters.', 'error'); return; }
    if (password.length < 6) { showStatus('Password must be at least 6 characters.', 'error'); return; }
    if (password !== confirm) { showStatus('Passwords do not match.', 'error'); return; }

    btn.disabled = true;
    showStatus('Registering…', 'info');

    try {
      const { users, sha } = await readUsers();

      if (users.find(u => u.username.toLowerCase() === username.toLowerCase())) {
        showStatus('Username already taken. Choose a different one.', 'error');
        btn.disabled = false;
        return;
      }

      const hash = await hashPassword(password);
      users.push({
        username,
        hash,
        active: false,   // ← admin must set this to true after payment
        createdAt: new Date().toISOString(),
        sessionToken: null,
      });

      await writeUsers(users, sha);
      showStatus('✅ Registered successfully! Your account will be activated after admin approval. Come back and login in the extension once approved.', 'success');
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('confirm').value  = '';
    } catch (err) {
      showStatus(`Error: ${err.message}`, 'error');
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
